name: Build Packages on Merge

on:
  push:
    branches:
      - main
    paths:
      - '**/*.spec'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.detect.outputs.packages }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          PACKAGES=$(echo "$CHANGED_FILES" | grep '\.spec$' | sed 's|/.*||' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup COPR credentials
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr.fedorainfracloud.org]
          username = ${{ secrets.COPR_USERNAME }}
          login = ${{ secrets.COPR_LOGIN }}
          token = ${{ secrets.COPR_TOKEN }}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          chmod 600 ~/.config/copr

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y copr-cli rpmdevtools

      - name: Build and push to COPR
        env:
          COPR_REPO: ${{ secrets.COPR_REPO }}
        run: |
          cd ${{ matrix.package }}
          copr-cli build "$COPR_REPO" *.spec --nowait

      - name: Comment on PR with build info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Build started for **${{ matrix.package }}** in COPR\n\nCheck status at: https://copr.fedorainfracloud.org/coprs/${{ secrets.COPR_REPO }}/builds/`
            })
