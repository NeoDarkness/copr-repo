# COPR Package Configuration
# This file defines packages to monitor and how to check for updates

packages:
  postman:
    source_url: https://dl.pstmn.io/download/latest/linux64
    # Alternative: GitHub API
    # source_url: https://github.com/postmanlabs/postman-app-support
    version_pattern: null
    enabled: true

  catppuccin-cursors:
    source_url: https://github.com/catppuccin/cursors
    version_pattern: null
    enabled: true

  catppuccin-grub-theme:
    source_url: https://github.com/catppuccin/grub
    version_pattern: null
    enabled: true

  catppuccin-plymouth-theme:
    source_url: https://github.com/catppuccin/plymouth
    version_pattern: null
    enabled: true

  catppuccin-whiskers:
    source_url: https://github.com/catppuccin/whiskers
    version_pattern: null
    enabled: true

  papirus-folders:
    source_url: https://github.com/PapirusDevelopmentTeam/papirus-folders
    version_pattern: null
    enabled: true

  papirus-folders-catppuccin:
    source_url: https://github.com/catppuccin/papirus-folders
    version_pattern: null
    enabled: true

  pipes.sh:
    source_url: https://github.com/pipeseroni/pipes.sh
    version_pattern: null
    enabled: true

# COPR Build Configuration
copr:
  # Set these as GitHub Secrets for security
  # COPR_USERNAME: your-username
  # COPR_LOGIN: your-login-token
  # COPR_TOKEN: your-copr-token
  # COPR_REPO: your-copr-repo-name (e.g., username/my-repo)
  
  build_targets:
    - fedora-latest
    - fedora-rawhide

# GitHub Actions Configuration
github:
  # Schedule: cron format (UTC)
  # 0 2 * * * = Daily at 2 AM UTC
  check_schedule: '0 2 * * *'
  
  # Auto-merge updates if tests pass
  auto_merge: false
